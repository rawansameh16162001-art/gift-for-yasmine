<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لياسمين</title>
    <style>
        /* 1. السطر ده هو اللي هيخليكي تنزلي وتطلعي في الموبايل براحتك */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #ffdde1; font-family: sans-serif;
            overflow-x: hidden; /* يمنع الهزة يمين وشمال */
            overflow-y: auto;   /* يسمح بالنزول لتحت */
        }

        .splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ee9ca7; z-index: 1000; display: flex; 
            align-items: center; justify-content: center; color: white; cursor: pointer;
        }
        .splash.hidden { display: none; }

        #main { 
            display: none; padding: 20px; text-align: center; 
            flex-direction: column; align-items: center; 
        }
        #main.show { display: flex; }

        .counter { font-size: 2.5rem; color: #d63384; margin: 20px 0; }
        
        /* الصور التلاتة بأسماء ملفاتك */
        .photo-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .photo { width: 100px; height: 100px; border: 4px solid white; border-radius: 10px; object-fit: cover; }

        /* المسدج اللي كانت مش بتبان كاملة */
        .message-box { 
            background: white; color: #d63384; padding: 20px; 
            border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 90%; line-height: 1.6; font-size: 1.1rem;
            margin-bottom: 50px; /* مسافة تحت عشان المسدج ما تلزقش في آخر الشاشة */
        }

        .heart { position: fixed; color: rgba(255, 77, 109, 0.7); font-size: 20px; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="splash" id="splash" onclick="showMain()">
        <h1>دوسى هنا يا ياسمين 💖</h1>
    </div>

    <div id="main">
        <div class="counter" id="counter">00 : 00 : 00</div>
        
        <div class="photo-container">
            <img src="pic1.jpg" class="photo" alt="1">
            <img src="pic2.jpg" class="photo" alt="2">
            <img src="pic3.jpg" class="photo" alt="3">
        </div>

        <div class="message-box">
            ياسمين حبيبتي... كل سنة وأنتِ طيبة! 🎉 <br>
            (هنا بقية كلامك اللي كان بيختفي في الموبايل.. دلوقتي هيبان كله وهتقدري تنزلي له)
        </div>
    </div>

    <audio id="myMusic" src="music.mp3" loop></audio>

    <script>
        function showMain() {
            // 1. إخفاء الشاشة الأولى
            document.getElementById('splash').classList.add('hidden');
            
            // 2. إظهار المحتوى
            document.getElementById('main').classList.add('show');
            
            // 3. تشغيل الأغنية والعداد والقلوب
            document.getElementById('myMusic').play();
            startCounter();
            createHearts();
        }

        // كود العداد الأصلي
        function startCounter() {
            let s = 0;
            setInterval(() => {
                s++;
                let h = Math.floor(s/3600);
                let m = Math.floor((s%3600)/60);
                let sec = s%60;
                document.getElementById('counter').innerText = 
                    `${h<10?'0'+h:h} : ${m<10?'0'+m:m} : ${sec<10?'0'+sec:sec}`;
            }, 1000);
        }

        // كود القلوب اللي كانت بتنزل
        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-10vh';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
