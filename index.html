<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة ياسمين 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: white;
            overflow: hidden; /* مقفول في الأول عشان الـ Splash */
            min-height: 100vh;
        }

        /* Splash Screen */
        .splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; cursor: pointer;
        }

        .splash.hidden { display: none; }

        .splash h1 { font-size: 2.5rem; color: white; margin-bottom: 2rem; animation: bounce 2s infinite; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }

        /* Main Page */
        .main {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            gap: 40px;
        }

        .main.show { display: flex; }

        /* Counter */
        .counter {
            display: flex; gap: 20px;
            background: rgba(255, 105, 180, 0.2);
            padding: 15px 30px; border-radius: 25px;
            border: 2px solid #ff69b4;
        }

        .counter-number { font-size: 2rem; color: #ff69b4; font-weight: bold; display: block; }

        /* Photos */
        .photos { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .polaroid {
            width: 150px; background: white; padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); transform: rotate(-5deg);
        }
        .polaroid img { width: 100%; height: auto; }

        /* Message Box */
        .message {
            background: rgba(255, 255, 255, 0.95);
            color: #333; padding: 30px; border-radius: 20px;
            max-width: 600px; width: 95%; text-align: center;
            line-height: 1.8; border: 3px solid #ff69b4;
            margin-bottom: 50px;
        }

        .heart { position: fixed; font-size: 24px; z-index: 10; animation: fall 4s linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="splash" id="splash">
        <h1>أهلاً بكِ يا ياسمين 💕</h1>
        <button class="splash-btn" style="padding: 15px 30px; border-radius: 50px; border: none; background: white; color: #ff69b4; font-weight: bold; cursor: pointer;">دوسي هنا للمفاجأة</button>
    </div>

    <div class="main" id="main">
        <iframe id="youtube-player" width="1" height="1" src="https://www.youtube.com/embed/eGBvb3OHKao?enablejsapi=1" frameborder="0" style="opacity:0;"></iframe>

        <div class="counter">
            <div class="counter-item"><span class="counter-number" id="days">00</span><span>أيام</span></div>
            <div class="counter-item"><span class="counter-number" id="hours">00</span><span>ساعات</span></div>
            <div class="counter-item"><span class="counter-number" id="minutes">00</span><span>دقائق</span></div>
        </div>

        <div class="photos">
            <div class="polaroid"><img src="pic1.jpg" onerror="this.parentElement.style.display='none'"></div>
            <div class="polaroid" style="transform: rotate(5deg);"><img src="pic2.jpg" onerror="this.parentElement.style.display='none'"></div>
        </div>

        <div class="message">
            <h3 style="color: #ff69b4; margin-bottom: 15px;">صاحبة عمري.. ❤️</h3>
            <p>بيقولو معرفة الناس كنوز، وأنتي كل كنوزي.</p>
            <p>من يوم 10 / 10 / 2019 وكل يوم بيثبتلي إن وجودك في حياتي نعمة كبيرة.</p>
            <p>بتمنى كل حياتي تكوني أنتي صحبتي وأختي.</p>
            <p>يارب أشوفك أسعد واحدة في الدنيا.</p>
            <p style="font-weight: bold; margin-top: 15px; color: #ff69b4;">بحبك للأبد ❤️</p>
        </div>
    </div>

    <script>
        function showMain() {
            // 1. إخفاء الـ Splash وإظهار المحتوى
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('main').classList.add('show');

            // 2. فتح السكرول عشان الرسالة تظهر
            document.body.style.overflow = 'auto';

            // 3. تشغيل العداد والقلوب
            startCounter();
            startHearts();

            // 4. تشغيل الموسيقى
            const player = document.getElementById('youtube-player');
            player.src += "&autoplay=1";
        }

        function startCounter() {
            const startDate = new Date('2019-10-10T00:00:00').getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = now - startDate;
                document.getElementById('days').textContent = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').textContent = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').textContent = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            }, 1000);
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
        }

        // ربط الضغطة بالوظيفة
        document.getElementById('splash').addEventListener('click', showMain);
    </script>
</body>
</html>
